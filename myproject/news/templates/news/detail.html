<!DOCTYPE html>
<html>
<head>
    <title>{{ news.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <a href="/" class="btn btn-secondary mb-3">← Back</a>

    <h1>{{ news.title }}</h1>
    <p class="text-muted">{{ news.created_at|date:"M d, Y" }}</p>

    {% if news.image %}
        <img src="{{ news.image.url }}" class="img-fluid mb-3">
    {% endif %}

    <div>
        {{ news.content|safe }}
    </div>

</div>

</body>
</html>
